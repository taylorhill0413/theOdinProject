<DOCTYLE HTML>
<header>
  <title>Rock Paper Scissors</title>
  
  <style>
    .result, .game{
  font-size: 25px;
  text-align: center;
}

.play{
  border: 5px solid green;
  padding: 5px;
  margin-bottom: 15px;
}
  </style>
</header>
<body>
  <div class="game">
  <h1>Rock Paper Scissors</h1>
  <p>Rock, Paper, Scissors – Play 5 Rounds vs Computer You will play 5 rounds of Rock, Paper, Scissors against the computer.

Goal: Try to win more rounds than the computer! At the end of 5 rounds, your total wins, losses, and ties will be displayed.</p>
  <div class="button">
    <button class="rock">Rock</button>
    <button class="paper">Paper</button>
    <button class="scissors">Scissors</button>
  </div>
  <button class="reset">Reset game</button>
  <div class="result"></div>
  
</div>
<script>
    function getComputerChoice(){
    var random_number = parseInt(Math.random()*10);
    var result = (random_number < 4) ? "rock" : (random_number < 7) ? "paper" : "scissors";
    return result;
}
function getHumanChoice(){
    var choice = prompt("Your choice:", "rock");
    return choice.toLowerCase();
}

function toUpperFirstLetter(str){
    return str.replace(str[0], str[0].toUpperCase());
}
function playRound(humanChoice, computerChoice){
    if ((humanChoice =="rock") && (computerChoice == "scissors") || (humanChoice =="paper") && (computerChoice == "rock") || (humanChoice =="scissors") &&(computerChoice=="paper")){
        console.log(`You win! ${toUpperFirstLetter(humanChoice)} beats ${toUpperFirstLetter(computerChoice)}`)
        return 1
    }
    else {
        console.log(`You lose! ${toUpperFirstLetter(humanChoice)} beats ${toUpperFirstLetter(computerChoice)}`)
        return 0
    }
}
function playGame(){
    var humanScore = 0, computerScore = 0;
    for (var i=0; i<5; i++){
        var humanSelection = getHumanChoice();
        var computerSelection = getComputerChoice();
        score = playRound(humanSelection, computerSelection);
        if (score == 1)
          humanScore += 1;
        else
          computerScore +=1;
    }
    console.log(`Score: Human ${humanScore} VS Computer ${computerScore}`);
    document.querySelector(".result").innerText = `Score: Human ${humanScore} VS Computer ${computerScore}`;
}
var humanScore = 0, computerScore = 0;
var humanChoices = document.querySelector(".button");
humanChoices.addEventListener("click", (e)=>{
  var target = e.target;
  if (humanScore >= 5 || computerScore > 5){
    alert("Game over!")
  }
  switch (target.class){
    case "rock":
      var humanSelection = "rock";
      break
    case "paper":
      var humanSelection = "paper";
      break
    case "scissors":
      var humanSelection = "scissors";
      break
  var computerSelection = getComputerChoice();
  score = playRound(humanSelection, computerSelection);
  if (score == 1)
    humanScore += 1;
  else
    computerScore +=1;
  }
  console.log(`Score: Human ${humanScore} VS Computer ${computerScore}`);
  document.querySelector(".result").innerText = `Score: Human ${humanScore} VS Computer ${computerScore}`;
  if (humanScore >= 5 || computerScore > 5){
    alert("Game over!")
  }
})
var reset = document.querySelector(".reset")
reset.addEventListener("click", () => {
  humanScore = 0;
  computerScore = 0;
})
  </script>
</body>
